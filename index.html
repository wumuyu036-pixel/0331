<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Meadow: Strong Wind & Transitions</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            color: white;
        }

        video { display: none; }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-panel {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 100;
        }

        #status { font-weight: bold; font-size: 1.1rem; margin-bottom: 2px; }
        #instructions { font-size: 0.85rem; opacity: 0.9; }
        #mode-display { font-size: 0.85rem; color: #ffd700; margin-top: 6px; font-weight: bold; letter-spacing: 0.5px;}
    </style>
</head>
<body>

    <div class="ui-panel">
        <div id="status">Magic Meadow is initializing...</div>
        <div id="instructions">✋ Blow seeds | ✊ Regenerate | ✌️ Strong Wind</div>
        <div id="mode-display">Mode: Loading...</div>
    </div>

    <canvas id="canvas"></canvas>
    <video id="input_video" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const modeDisplay = document.getElementById('mode-display');

        let width, height;
        let dandelions = [];
        let driftingSeeds = [];
        let clouds = [];
        let stars = [];
        let fireflies = [];
        let butterflies = [];
        
        // --- GESTURE & WIND STATE ---
        let isHandOpen = false;
        let isStrongWind = false;
        let wasStrongWind = false; // Tracks when the wind gesture stops
        let currentWindForce = 0; 
        let globalTime = 0;

        const TOTAL_DANDELIONS = 100; 
        const TOTAL_LAYERS = 8; 
        const BUTTERFLY_COUNT = 8;

        // --- PALETTES [R, G, B, A] for Smooth Interpolation ---
        const palettes = {
            day: {
                skyTop: [77, 169, 255, 1], skyBottom: [135, 206, 235, 1],
                hills: [102, 187, 106, 1], meadowTop: [124, 179, 66, 1], meadowBottom: [27, 94, 32, 1],
                stem: [90, 140, 47, 1], head: [247, 224, 138, 1], seed: [255, 255, 255, 0.95],
                cloudTint: [255, 255, 255, 0.6]
            },
            sunset: {
                skyTop: [255, 126, 95, 1], skyBottom: [254, 180, 123, 1],
                hills: [180, 110, 80, 1], meadowTop: [160, 130, 60, 1], meadowBottom: [60, 40, 20, 1],
                stem: [70, 60, 30, 1], head: [255, 200, 100, 1], seed: [255, 220, 200, 0.9],
                cloudTint: [255, 200, 200, 0.5]
            },
            night: {
                skyTop: [1, 8, 26, 1], skyBottom: [11, 32, 74, 1],
                hills: [10, 38, 8, 1], meadowTop: [15, 54, 8, 1], meadowBottom: [3, 18, 1, 1],
                stem: [26, 48, 12, 1], head: [201, 179, 109, 1], seed: [160, 160, 160, 0.6],
                cloudTint: [100, 120, 160, 0.3]
            }
        };

        let currentPalette = JSON.parse(JSON.stringify(palettes.day));
        let sunOp = 1.0, sunsetOp = 0.0, moonOp = 0.0;

        // --- MODE STATE ---
        let appMode = 0; 
        let targetModeName = 'day';
        let autoStateIndex = 0; 
        const autoStates = ['day', 'sunset', 'night', 'sunset'];
        let lastAutoSwitchTime = 0;
        const AUTO_CYCLE_TIME_MS = 30000; 

        const MODE_LABELS = ["Manual: Day ☀️", "Manual: Sunset 🌇", "Manual: Night 🌙", "Auto Cycle ⏳"];

        // --- TRANSITION PLUGIN ---
        class SceneTransitionPlugin {
            constructor() {
                this.active = false;
                this.alpha = 0;
                this.color = [255, 255, 255];
                this.phase = 0;
            }
            trigger(modeName) {
                this.active = true;
                this.phase = 0;
                // Match the flash overlay color to the vibe of the incoming mode
                if (modeName === 'day') this.color = [255, 255, 255];
                else if (modeName === 'sunset') this.color = [255, 160, 100];
                else if (modeName === 'night') this.color = [10, 10, 20];
            }
            render(ctx, width, height) {
                if (!this.active) return;
                this.phase += 0.025; // Transition speed
                if (this.phase >= Math.PI) {
                    this.active = false;
                    return;
                }
                // Sine wave fade-in and fade-out
                this.alpha = Math.sin(this.phase) * 0.45; 
                ctx.fillStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.alpha})`;
                ctx.fillRect(0, 0, width, height);
            }
        }
        const transitionPlugin = new SceneTransitionPlugin();

        function updateModeUI() {
            let label = MODE_LABELS[appMode];
            if(appMode === 3) label += ` (${targetModeName.toUpperCase()})`;
            modeDisplay.textContent = `[Press 'M' to Switch] ${label}`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyM') {
                appMode = (appMode + 1) % 4; 
                if (appMode === 0) targetModeName = 'day';
                else if (appMode === 1) targetModeName = 'sunset';
                else if (appMode === 2) targetModeName = 'night';
                else if (appMode === 3) {
                    autoStateIndex = 0;
                    targetModeName = autoStates[autoStateIndex];
                    lastAutoSwitchTime = performance.now();
                }
                updateModeUI();
                transitionPlugin.trigger(targetModeName); // Trigger plugin effect
            }
        });

        function toRgba(arr) {
            return `rgba(${arr[0]}, ${arr[1]}, ${arr[2]}, ${arr[3]})`;
        }

        function updateTransitions() {
            const t = 0.015; 
            const target = palettes[targetModeName];
            for (let key in currentPalette) {
                for(let i=0; i<4; i++) {
                    currentPalette[key][i] += (target[key][i] - currentPalette[key][i]) * t;
                }
            }
            sunOp += ((targetModeName === 'day' ? 1 : 0) - sunOp) * t;
            sunsetOp += ((targetModeName === 'sunset' ? 1 : 0) - sunsetOp) * t;
            moonOp += ((targetModeName === 'night' ? 1 : 0) - moonOp) * t;
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initMeadow();
        }
        window.addEventListener('resize', resize);

        // --- CELESTIALS ---
        function drawSun() {
            if (sunOp < 0.01) return;
            ctx.save();
            ctx.globalAlpha = sunOp;
            ctx.shadowBlur = 50;
            ctx.shadowColor = "#FFFACD";
            ctx.beginPath(); ctx.arc(100, 100, 45, 0, Math.PI * 2); ctx.fillStyle = "rgba(255, 250, 200, 0.4)"; ctx.fill();
            ctx.beginPath(); ctx.arc(100, 100, 40, 0, Math.PI * 2); ctx.fillStyle = "#F7E08A"; ctx.fill();
            ctx.restore();
        }

        function drawSunsetSun() {
            if (sunsetOp < 0.01) return;
            ctx.save();
            ctx.globalAlpha = sunsetOp;
            ctx.shadowBlur = 60;
            ctx.shadowColor = "#FF6347";
            ctx.beginPath(); ctx.arc(150, height * 0.5, 60, 0, Math.PI * 2); ctx.fillStyle = "rgba(255, 150, 100, 0.5)"; ctx.fill();
            ctx.beginPath(); ctx.arc(150, height * 0.5, 55, 0, Math.PI * 2); ctx.fillStyle = "#FF8C00"; ctx.fill();
            ctx.restore();
        }

        function drawMoon() {
            if (moonOp < 0.01) return;
            ctx.save();
            ctx.globalAlpha = moonOp;
            ctx.shadowBlur = 40;
            ctx.shadowColor = "#ADD8E6";
            ctx.beginPath(); ctx.arc(120, 120, 35, 0, Math.PI * 2); ctx.fillStyle = "#f0f8ff"; ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(135, 110, 35, 0, Math.PI * 2); ctx.fillStyle = "black"; ctx.fill();
            ctx.restore();
        }

        // --- WANDERING ENTITIES ---
        class WanderingEntity {
            constructor() {
                this.x = Math.random() * width;
                this.y = height * 0.7 + Math.random() * (height * 0.3); 
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.speed = 0.05 + Math.random() * 0.05; 
                this.phase = Math.random() * Math.PI * 2;
                this.windOpacity = 1.0; 
            }
            update() {
                this.vx += (Math.random() - 0.5) * 0.15;
                this.vy += (Math.random() - 0.5) * 0.15;
                this.vx = Math.max(-1.5, Math.min(1.5, this.vx));
                this.vy = Math.max(-1.5, Math.min(1.5, this.vy));
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < height * 0.65) this.vy += 0.2; 
                if (this.y > height) this.vy -= 0.2; 

                // Disappear during strong wind, reappear when it stops
                if (isStrongWind) {
                    this.windOpacity = Math.max(0, this.windOpacity - 0.05);
                } else {
                    this.windOpacity = Math.min(1, this.windOpacity + 0.02);
                }
            }
        }

        class Firefly extends WanderingEntity {
            constructor() { super(); this.size = Math.random() * 2 + 1; }
            draw() {
                if (moonOp < 0.01 || this.windOpacity <= 0) return; 
                const alpha = (0.2 + 0.8 * Math.abs(Math.sin(globalTime * this.speed + this.phase))) * moonOp * this.windOpacity;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 12; ctx.shadowColor = "#ccff00"; ctx.fillStyle = "#e6ff66";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Butterfly extends WanderingEntity {
            constructor() {
                super();
                this.size = Math.random() * 3 + 2; 
                const colors = ['#FF6347', '#1E90FF', '#FFD700', '#FF1493'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.wingPhaseSpeed = 0.1 + Math.random() * 0.2;
            }
            draw() {
                const dayAlpha = Math.min(1, sunOp + sunsetOp) * this.windOpacity;
                if (dayAlpha < 0.01) return;
                const wingSway = Math.abs(Math.sin(globalTime * this.wingPhaseSpeed + this.phase));
                
                ctx.save();
                ctx.globalAlpha = dayAlpha;
                ctx.fillStyle = this.color;
                
                const wingWidth = this.size * 2 * wingSway;
                const wingHeight = this.size;
                
                ctx.beginPath(); ctx.ellipse(this.x - wingWidth/2, this.y, wingWidth/2, wingHeight, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(this.x + wingWidth/2, this.y, wingWidth/2, wingHeight, 0, 0, Math.PI * 2); ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size * 0.2, this.size, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * (height * 0.6); 
                this.size = Math.random() * 1.5 + 0.5; this.speed = 0.02 + Math.random() * 0.03; this.phase = Math.random() * Math.PI * 2;
            }
            draw() {
                if (moonOp < 0.01) return;
                const alpha = (0.3 + 0.7 * Math.abs(Math.sin(globalTime * this.speed + this.phase))) * moonOp;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        // --- FLORA & ENVIRONMENT ---
        class Cloud {
            constructor() { this.reset(true); }
            reset(initial = false) {
                this.scale = 0.5 + Math.random() * 1.0;
                this.x = initial ? Math.random() * width : -300 * this.scale;
                this.y = Math.random() * (height * 0.45); 
                this.speed = (0.2 + Math.random() * 0.5);
                this.circles = []; 
                const num = 5 + Math.floor(Math.random() * 4);
                for (let i = 0; i < num; i++) {
                    this.circles.push({
                        relX: (i * 30 - (num * 15)) * this.scale,
                        relY: (Math.random() * 20 - 10) * this.scale,
                        r: (20 + Math.random() * 30) * this.scale
                    });
                }
            }
            update() {
                // Clouds move much faster rightward if there is strong wind
                this.x += this.speed + (currentWindForce * 0.15);
                if (this.x - (150 * this.scale) > width) this.reset();
            }
            draw() {
                ctx.fillStyle = toRgba(currentPalette.cloudTint);
                ctx.beginPath();
                this.circles.forEach(c => {
                    ctx.moveTo(this.x + c.relX + c.r, this.y + c.relY);
                    ctx.arc(this.x + c.relX, this.y + c.relY, c.r, 0, Math.PI * 2);
                });
                ctx.fill();
            }
        }

        class Dandelion {
            constructor(layerIndex) {
                const MEADOW_TOP = height * 0.7;
                const MEADOW_HEIGHT = height - MEADOW_TOP;
                const depthBandHeight = MEADOW_HEIGHT / TOTAL_LAYERS;
                const bandMinY = MEADOW_TOP + (layerIndex * depthBandHeight);
                const bandMaxY = bandMinY + depthBandHeight;

                this.baseX = Math.random() * width;
                this.baseY = bandMinY + Math.random() * (bandMaxY - bandMinY);
                const depthNormalized = layerIndex / (TOTAL_LAYERS - 1);
                this.headScale = 0.3 + (depthNormalized * 1.5); 
                
                this.stemHeight = (80 + Math.random() * 60) * this.headScale; 
                this.stemThickness = (3 + Math.random() * 3) * this.headScale; 
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swaySpeed = 0.01 + Math.random() * 0.01;
                this.swayAmount = (10 + Math.random() * 20) * this.headScale; 

                this.headX = this.baseX;
                this.headY = this.baseY - this.stemHeight;
                this.hasSeeds = true;
                this.seedScale = 1.0; 
                this.seedPattern = this.generateSeedPattern();
            }

            generateSeedPattern() {
                let pattern = [];
                let numSeeds = (50 + Math.random() * 40) * this.headScale; 
                for(let i = 0; i < numSeeds; i++) {
                    pattern.push({
                        angle: Math.random() * Math.PI * 2,
                        dist: Math.random() * 35 * this.headScale,
                        size: (1.5 + Math.random() * 1.5) * this.headScale
                    });
                }
                return pattern;
            }

            update() {
                let sway = Math.sin(globalTime * this.swaySpeed + this.swayPhase) * this.swayAmount;
                // Strong wind violently pushes stems to the right
                this.headX = this.baseX + sway + (currentWindForce * this.headScale);
                this.headY = this.baseY - this.stemHeight + Math.abs(sway * 0.1) + (currentWindForce * 0.2 * this.headScale); 

                if (this.hasSeeds && this.seedScale < 1.0) {
                    this.seedScale += 0.04;
                    if (this.seedScale > 1.0) this.seedScale = 1.0;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.baseX, this.baseY);
                ctx.quadraticCurveTo(this.baseX, this.baseY - this.stemHeight / 2, this.headX, this.headY);
                ctx.strokeStyle = toRgba(currentPalette.stem); 
                ctx.lineWidth = this.stemThickness;
                ctx.lineCap = "round";
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(this.headX, this.headY, 4 * this.headScale, 0, Math.PI * 2);
                ctx.fillStyle = toRgba(currentPalette.head); 
                ctx.fill();

                if (this.hasSeeds && this.seedScale > 0) {
                    ctx.fillStyle = toRgba(currentPalette.seed); 
                    this.seedPattern.forEach(seed => {
                        let sx = this.headX + Math.cos(seed.angle) * (seed.dist * this.seedScale);
                        let sy = this.headY + Math.sin(seed.angle) * (seed.dist * this.seedScale);
                        ctx.beginPath();
                        ctx.arc(sx, sy, seed.size * this.seedScale, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
            }

            blowSeeds() {
                if (!this.hasSeeds) return;
                this.hasSeeds = false;
                this.seedPattern.forEach(seed => {
                    let startX = this.headX + Math.cos(seed.angle) * (seed.dist * this.seedScale);
                    let startY = this.headY + Math.sin(seed.angle) * (seed.dist * this.seedScale);
                    driftingSeeds.push(new DriftingSeed(startX, startY, seed.size * this.seedScale));
                });
            }

            regenerateSeeds() {
                if (this.hasSeeds) return;
                this.hasSeeds = true;
                this.seedScale = 0.0; 
            }
        }

        class DriftingSeed {
            constructor(x, y, size) {
                this.x = x; this.y = y; this.size = size; this.opacity = 1.0;
                this.vx = (Math.random() - 0.2) * 6; this.vy = (Math.random() - 0.7) * 6; 
            }
            update() {
                // Wind pushes seeds significantly faster along X axis
                this.vx += 0.04 + Math.random() * 0.03 + (currentWindForce * 0.008); 
                this.vy -= 0.03 + Math.random() * 0.03; 
                this.vx *= 0.95; this.vy *= 0.95;
                this.x += this.vx; this.y += this.vy;
                this.opacity -= 0.004; 
                if (this.x > width || this.y < 0) this.opacity -= 0.02;
            }
            draw() {
                if (this.opacity <= 0) return;
                let c = currentPalette.seed;
                ctx.fillStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${c[3] * this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        // --- INITIALIZATION & LOOP ---
        function initMeadow() {
            dandelions = []; driftingSeeds = []; clouds = []; stars = []; fireflies = []; butterflies = [];
            for (let layer = 0; layer < TOTAL_LAYERS; layer++) {
                const countInLayer = Math.floor(TOTAL_DANDELIONS / TOTAL_LAYERS);
                for (let i = 0; i < countInLayer; i++) dandelions.push(new Dandelion(layer));
            }
            for (let i = 0; i < 5; i++) clouds.push(new Cloud());
            for (let i = 0; i < 150; i++) stars.push(new Star());
            for (let i = 0; i < 40; i++) fireflies.push(new Firefly());
            for (let i = 0; i < BUTTERFLY_COUNT; i++) butterflies.push(new Butterfly());
            updateModeUI();
        }

        function drawBackground() {
            const skyGrd = ctx.createLinearGradient(0, 0, 0, height * 0.7);
            skyGrd.addColorStop(0, toRgba(currentPalette.skyTop)); 
            skyGrd.addColorStop(1, toRgba(currentPalette.skyBottom)); 
            ctx.fillStyle = skyGrd; ctx.fillRect(0, 0, width, height * 0.7);

            stars.forEach(s => s.draw());
            drawSun(); drawSunsetSun(); drawMoon();
            clouds.forEach(c => { c.update(); c.draw(); });

            ctx.beginPath();
            ctx.moveTo(0, height * 0.7);
            ctx.bezierCurveTo(width * 0.25, height * 0.55, width * 0.4, height * 0.65, width * 0.5, height * 0.6);
            ctx.bezierCurveTo(width * 0.75, height * 0.5, width * 0.8, height * 0.7, width, height * 0.55);
            ctx.lineTo(width, height * 0.7); ctx.lineTo(0, height * 0.7);
            ctx.fillStyle = toRgba(currentPalette.hills); ctx.fill();

            const meadowGrd = ctx.createLinearGradient(0, height * 0.7, 0, height);
            meadowGrd.addColorStop(0, toRgba(currentPalette.meadowTop)); 
            meadowGrd.addColorStop(1, toRgba(currentPalette.meadowBottom)); 
            ctx.fillStyle = meadowGrd; ctx.fillRect(0, height * 0.7, width, height * 0.3);
        }

        function animate(timestamp) {
            globalTime++;
            
            // Auto Cycle Logic
            if (appMode === 3) {
                if (!lastAutoSwitchTime) lastAutoSwitchTime = timestamp;
                if (timestamp - lastAutoSwitchTime >= AUTO_CYCLE_TIME_MS) {
                    autoStateIndex = (autoStateIndex + 1) % autoStates.length;
                    targetModeName = autoStates[autoStateIndex];
                    lastAutoSwitchTime = timestamp;
                    updateModeUI();
                    transitionPlugin.trigger(targetModeName); // Trigger plugin effect
                }
            }

            // Smooth Wind Transition (Easing)
            const windTarget = isStrongWind ? 120 : 0;
            currentWindForce += (windTarget - currentWindForce) * 0.05;

            updateTransitions();
            ctx.clearRect(0, 0, width, height);
            drawBackground();

            dandelions.sort((a, b) => a.baseY - b.baseY);
            dandelions.forEach(d => { d.update(); d.draw(); });

            for (let i = driftingSeeds.length - 1; i >= 0; i--) {
                let seed = driftingSeeds[i]; seed.update(); seed.draw();
                if (seed.opacity <= 0) driftingSeeds.splice(i, 1);
            }

            fireflies.forEach(f => { f.update(); f.draw(); });
            butterflies.forEach(b => { b.update(); b.draw(); });

            // Render transition effect on top of everything
            transitionPlugin.render(ctx, width, height);

            requestAnimationFrame(animate);
        }

        resize(); 
        requestAnimationFrame(animate); 

        // --- MEDIAPIPE GESTURE TRACKING ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const tip8 = landmarks[8]; 
                
                // Euclidean distance helper
                const d = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                
                // Determine if specific fingers are extended
                const indexUp = d(landmarks[8], wrist) > d(landmarks[5], wrist) * 1.3;
                const middleUp = d(landmarks[12], wrist) > d(landmarks[9], wrist) * 1.3;
                const ringUp = d(landmarks[16], wrist) > d(landmarks[13], wrist) * 1.3;
                const pinkyUp = d(landmarks[20], wrist) > d(landmarks[17], wrist) * 1.3;

                // Peace Sign Logic: Index & Middle UP, Ring & Pinky DOWN
                const isPeace = indexUp && middleUp && !ringUp && !pinkyUp;
                
                // Original Open Hand Logic (overridden if peace sign is active)
                const dist = d(tip8, wrist);
                const currentGestureOpen = dist > 0.4 && !isPeace; 

                // Resolve States
                if (isPeace) {
                    isStrongWind = true;
                    wasStrongWind = true; // Mark that wind occurred
                    statusText.textContent = "Peace Sign! Strong wind dispersing seeds! 💨";
                    isHandOpen = false; 
                    
                    // Automatically disperse all seeds into the strong wind!
                    dandelions.forEach(d => d.blowSeeds());
                    
                } else {
                    isStrongWind = false; 
                    
                    // Return everything to original state when gesture drops
                    if (wasStrongWind) {
                        wasStrongWind = false;
                        statusText.textContent = "Wind stopped. Regenerating meadow...";
                        dandelions.forEach(d => d.regenerateSeeds());
                    }

                    if (currentGestureOpen && !isHandOpen) {
                        isHandOpen = true;
                        statusText.textContent = "Blowing seeds with Open Hand! ✋";
                        dandelions.forEach(d => d.blowSeeds());
                    } else if (!currentGestureOpen && isHandOpen) {
                        isHandOpen = false;
                        statusText.textContent = "Regenerating with Closed Fist! ✊";
                        dandelions.forEach(d => d.regenerateSeeds());
                    } else if (!currentGestureOpen && !isHandOpen) {
                        statusText.textContent = "AI Detecting Hand... Show a gesture!";
                    }
                }
            } else {
                isStrongWind = false; 
                
                if (wasStrongWind) {
                    wasStrongWind = false;
                    statusText.textContent = "Meadow resting... Regenerating dandelions.";
                    dandelions.forEach(d => d.regenerateSeeds());
                } else if (isHandOpen) {
                    isHandOpen = false;
                    statusText.textContent = "Meadow resting... Regenerating dandelions.";
                    dandelions.forEach(d => d.regenerateSeeds());
                } else {
                    statusText.textContent = "AI Ready. Show your hand! 👋";
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        camera.start().then(() => {
            statusText.textContent = "Meadow Ready. Show your hand!👋";
        });

    </script>
</body>
</html>
